<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GASA TECH | Digital Architects</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0e14;
            --card-bg: #161b22;
            --primary: #00a2ff;
            --text-main: #ffffff;
            --text-dim: #8b949e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text-main); overflow-x: hidden; }

        /* Animated Background */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(0,162,255,0.05) 0%, transparent 80%);
            z-index: -1;
        }

        /* Navigation UI */
        header {
            position: fixed; top: 0; width: 100%; padding: 1.5rem 8%;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(11, 14, 20, 0.9); backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.05); z-index: 1000;
        }

        .logo { font-weight: 900; font-size: 1.4rem; color: #fff; text-decoration: none; letter-spacing: 1px; }
        .logo span { color: var(--primary); }

        nav a { color: var(--text-dim); text-decoration: none; margin-left: 1.5rem; font-size: 0.85rem; font-weight: 700; text-transform: uppercase; transition: 0.3s; }
        nav a:hover { color: var(--primary); }

        /* Hero Section with Entrance Animation */
        section { 
            height: 100vh; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; text-align: center; padding: 0 10%; 
        }

        h1 { 
            font-size: clamp(2.5rem, 6vw, 4.5rem); line-height: 1.1; margin-bottom: 1.5rem; 
            opacity: 0; transform: translateY(30px); animation: fadeInUp 1s forwards;
        }
        h1 span { color: var(--primary); }

        p { 
            color: var(--text-dim); max-width: 650px; margin-bottom: 2.5rem; font-size: 1.1rem;
            opacity: 0; transform: translateY(30px); animation: fadeInUp 1s 0.3s forwards;
        }

        .btn { 
            padding: 1rem 2.5rem; border-radius: 50px; text-decoration: none; font-weight: 800; 
            transition: 0.4s; background: var(--primary); color: white;
            box-shadow: 0 10px 30px rgba(0, 162, 255, 0.3);
            opacity: 0; transform: translateY(30px); animation: fadeInUp 1s 0.6s forwards;
        }
        .btn:hover { transform: scale(1.05); background: white; color: var(--bg); }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">GASA<span>TECH</span></a>
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">Architecture</a>
            <a href="services.html">Services</a>
            <a href="pricing.html">Pricing</a>
            <a href="portfolio.html">Portfolio</a>
            <a href="contact.html">Deploy</a>
        </nav>
    </header>

    <section>
        <h1>Engineering the <br><span>Digital Frontier.</span></h1>
        <p>GASA TECH PTY LTD specializes in high-performance systems engineering. We don't just build websites; we deploy strategic digital assets built to scale.</p>
        <a href="services.html" class="btn">Explore Services</a>
    </section>

</body>
</html>>
