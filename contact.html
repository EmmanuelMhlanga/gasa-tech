<!DOCTYPE html>
<html lang="en">
<head>
    <title>Deploy | GASA TECH</title>
</head>
<body>
    <header>
        <a href="index.html" class="logo">GASA <span>TECH</span></a>
        <nav><a href="index.html">Home</a><a href="about.html">Architecture</a><a href="services.html">Services</a><a href="portfolio.html">Portfolio</a><a href="pricing.html">Pricing</a><a href="contact.html" class="active">Deploy</a></nav>
    </header>
    <section style="padding: 140px 8% 100px; display: flex; justify-content: center; align-items: center; flex: 1;">
        <div style="background: var(--card-bg); padding: 4rem; border-radius: 32px; width: 100%; max-width: 650px; border: 1px solid rgba(255,255,255,0.05);">
            <h1 style="margin-bottom: 1rem; font-size: 2.5rem;">Initialize <span>Deployment</span></h1>
            <p style="color: var(--text-dim); margin-bottom: 2.5rem;">Submit your project requirements to our engineering desk.</p>
            <form action="https://formspree.io/f/YOUR_ID" method="POST">
                <input type="text" name="name" placeholder="Full Name" required style="width: 100%; padding: 1.2rem; background: #0b1121; border: 1px solid #333; color: #fff; margin-bottom: 1.5rem; border-radius: 12px; outline: none;">
                <input type="email" name="email" placeholder="Email Address" required style="width: 100%; padding: 1.2rem; background: #0b1121; border: 1px solid #333; color: #fff; margin-bottom: 1.5rem; border-radius: 12px; outline: none;">
                <select name="tier" style="width: 100%; padding: 1.2rem; background: #0b1121; border: 1px solid #333; color: #fff; margin-bottom: 1.5rem; border-radius: 12px; outline: none;">
                    <option value="Basic">Basic Protocol (R3000)</option>
                    <option value="Standard">Standard Protocol (R3500)</option>
                    <option value="Premium">Elite Protocol (R4500)</option>
                </select>
                <textarea name="message" rows="5" placeholder="System Requirements..." required style="width: 100%; padding: 1.2rem; background: #0b1121; border: 1px solid #333; color: #fff; margin-bottom: 1.5rem; border-radius: 12px; outline: none;"></textarea>
                <button type="submit" style="width: 100%; padding: 1.5rem; background: var(--primary); color: #fff; border: none; border-radius: 12px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: 0.3s;">DEPLOY SYSTEM</button>
            </form>
        </div>
    </section>
    </body>
</html>
