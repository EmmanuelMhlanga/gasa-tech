<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deploy | GASA TECH</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0e14; --card-bg: #161b22; --primary: #00a2ff; --text-main: #ffffff; --text-dim: #8b949e; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text-main); }
        header { position: fixed; top: 0; width: 100%; padding: 1.5rem 8%; display: flex; justify-content: space-between; align-items: center; background: rgba(11, 14, 20, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.05); z-index: 1000; }
        .logo { font-weight: 900; font-size: 1.4rem; color: #fff; text-decoration: none; }
        .logo span { color: var(--primary); }
        nav a { color: var(--text-dim); text-decoration: none; margin-left: 1.5rem; font-size: 0.85rem; font-weight: 700; text-transform: uppercase; }
        section { padding: 120px 8% 60px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        form { background: var(--card-bg); padding: 3rem; border-radius: 15px; width: 100%; max-width: 500px; border: 1px solid rgba(255,255,255,0.05); }
        input, textarea { width: 100%; padding: 1rem; margin-bottom: 1rem; background: #0b0e14; border: 1px solid #333; color: #fff; border-radius: 5px; }
        button { width: 100%; padding: 1rem; background: var(--primary); border: none; color: #fff; font-weight: 700; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">GASA<span>TECH</span></a>
        <nav><a href="index.html">Home</a><a href="about.html">Architecture</a><a href="services.html">Services</a><a href="pricing.html">Pricing</a><a href="portfolio.html">Portfolio</a><a href="contact.html">Deploy</a></nav>
    </header>
    <section>
        <form action="https://formspree.io/f/YOUR_ID" method="POST">
            <h2 style="margin-bottom: 1.5rem;">Project Inquiry</h2>
            <input type="text" name="name" placeholder="Name" required>
            <input type="email" name="email" placeholder="Email" required>
            <textarea name="message" placeholder="Project Details" rows="5" required></textarea>
            <button type="submit">Submit Request</button>
        </form>
    </section>
</body>
</html>
