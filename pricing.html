<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing | GASA TECH</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0e14; --card-bg: #161b22; --primary: #00a2ff; --text-main: #ffffff; --text-dim: #8b949e; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text-main); }
        header { position: fixed; top: 0; width: 100%; padding: 1.5rem 8%; display: flex; justify-content: space-between; align-items: center; background: rgba(11, 14, 20, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.05); z-index: 1000; }
        .logo { font-weight: 900; font-size: 1.4rem; color: #fff; text-decoration: none; }
        .logo span { color: var(--primary); }
        nav a { color: var(--text-dim); text-decoration: none; margin-left: 1.5rem; font-size: 0.85rem; font-weight: 700; text-transform: uppercase; }
        section { padding: 120px 8% 60px; min-height: 100vh; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; max-width: 900px; margin: 3rem auto; }
        .card { background: var(--card-bg); padding: 3rem; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .highlight { border: 2px solid var(--primary); box-shadow: 0 0 20px rgba(0, 162, 255, 0.2); }
        .price { font-size: 2.5rem; font-weight: 900; margin: 1.5rem 0; }
        .btn { display: block; padding: 1rem; background: var(--primary); color: #fff; text-decoration: none; border-radius: 5px; font-weight: 700; margin-top: 1rem; }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">GASA<span>TECH</span></a>
        <nav><a href="index.html">Home</a><a href="about.html">Architecture</a><a href="services.html">Services</a><a href="pricing.html">Pricing</a><a href="portfolio.html">Portfolio</a><a href="contact.html">Deploy</a></nav>
    </header>
    <section>
        <h1>Deployment <span>Tiers</span></h1>
        <div class="grid">
            <div class="card"><h2>Core</h2><div class="price">R4,999</div><p>Standard Web Architecture</p><a href="contact.html" class="btn">Initialize</a></div>
            <div class="card highlight"><h2>Elite</h2><div class="price">R12,999+</div><p>Full System Engineering</p><a href="contact.html" class="btn">Initialize</a></div>
        </div>
    </section>
</body>
</html>
